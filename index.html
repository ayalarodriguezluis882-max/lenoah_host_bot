<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LenoahHost · Nova v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --bg-panel: #11111a;
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff66;
            --text-main: #e0e6ed;
            --text-dim: #7c8db5;
            --border: #2a2a35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Scanline Effect */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--neon-cyan);
            background: rgba(10, 10, 18, 0.9);
            z-index: 100;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-section h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-purple);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-item {
            padding: 0.5rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); color: var(--neon-cyan); }

        /* Chat Window */
        .chat-window {
            flex: 1;
            background: var(--bg-dark);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 10px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-nova {
            align-self: flex-start;
            background: rgba(0, 243, 255, 0.1);
            border-left: 4px solid var(--neon-cyan);
            color: var(--text-main);
        }

        .msg-user {
            align-self: flex-end;
            background: rgba(188, 19, 254, 0.1);
            border-right: 4px solid var(--neon-purple);
            color: var(--text-main);
        }

        .typing-indicator {
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-left: 1rem;
            display: none;
        }

        /* Input Area */
        .input-area {
            padding: 1rem 2rem;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        #user-input {
            flex: 1;
            background: #05050a;
            border: 1px solid var(--border);
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            border-radius: 5px;
        }
        #user-input:focus { outline: none; border-color: var(--neon-cyan); }

        .send-btn {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 0 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        .send-btn:hover { background: #fff; }

        /* Tariff Result Card */
        .tariff-card {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--neon-green);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }
        .tariff-code { font-family: 'Orbitron'; color: var(--neon-green); font-weight: bold; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

        /* Setup Screen */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
        #setup-screen.hidden { display: none; }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen">
        <div class="brand" style="font-size: 3rem; margin-bottom: 2rem;">LENHOST v6</div>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">Inicializando Sistema Nova...</p>
        <button class="send-btn" onclick="startSystem()" style="width: 200px;">INICIAR SISTEMA</button>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">
        <header>
            <div class="brand">LENOAH <span style="font-size: 0.8rem; color: var(--text-dim);">HOST v6</span></div>
            <div class="status-bar">
                <span id="clock">00:00</span>
                <span style="color: var(--neon-green);">● ONLINE</span>
            </div>
        </header>

        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>COMANDOS RÁPIDOS</h3>
                    <div class="sidebar-item" onclick="novaCommand('ayuda')">❓ Ayuda</div>
                    <div class="sidebar-item" onclick="novaCommand('estado')">🔋 Estado del Sistema</div>
                    <div class="sidebar-item" onclick="novaCommand('buscar 1005.90.04')">🔍 Buscar Código 1005.90.04</div>
                </div>
                <div class="sidebar-section">
                    <h3>ESTADÍSTICAS</h3>
                    <div style="color: var(--text-dim);">
                        <div>Consultas Hoy: <span id="query-count" style="color: var(--neon-cyan);">0</span></div>
                        <div>Base de Datos: <span style="color: var(--neon-cyan);">ACTIVA</span></div>
                    </div>
                </div>
            </aside>

            <!-- Chat Window -->
            <div class="chat-window" id="chat-window">
                <!-- Messages will appear here -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Escribe un comando (ej: Buscar [código], Ayuda)..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE (Extracted from LIGIE) ---
        const tariffDB = [
            { code: "1005.90.04", desc: "Maíz blanco (harinero)", unit: "Kg", tax: "50%" },
            { code: "1001.11.01", desc: "Trigo y morcajo (tranquillón) - Para siembra", unit: "Kg", tax: "Ex." },
            { code: "0102.29.99", desc: "Animales vivos de la especie bovina - Los demás", unit: "Pza", tax: "Ex." },
            { code: "0201.10.01", desc: "Carne de animales de la especie bovina, fresca o refrigerada", unit: "Kg", tax: "Ex." },
            { code: "0901.11.03", desc: "Café, incluso tostado o descafeinado", unit: "Kg", tax: "20%" },
            { code: "7208.10.03", desc: "Laminados planos de hierro o acero", unit: "Kg", tax: "Ex." },
            { code: "8708.99.99", desc: "Las demás partes y accesorios de vehículos", unit: "Pza", tax: "Ex." },
            { code: "9001.90.99", desc: "Las demás fibras ópticas", unit: "Kg", tax: "Ex." }
        ];

        let queryCount = 0;

        // --- SYSTEM START ---
        function startSystem() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            addMessage("nova", "Sistema Nova v6 Iniciado. Soy tu asistente aduanero. Estoy conectado a la base de datos TIGIE. ¿En qué puedo ayudarte?");
        }

        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- CHAT LOGIC ---
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage("user", text);
            input.value = "";
            queryCount++;
            document.getElementById('query-count').innerText = queryCount;

            processCommand(text.toLowerCase());
        }

        function addMessage(sender, text) {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message msg-${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processCommand(input) {
            // Typing indicator simulation
            setTimeout(() => {
                if (input.includes("ayuda")) {
                    addMessage("nova", "Comandos disponibles:<br>- <b>Buscar [código]</b>: Busca en la TIGIE.<br>- <b>Estado</b>: Muestra estado del sistema.<br>- <b>Limpiar</b>: Limpia el chat.");
                } else if (input.includes("estado")) {
                    addMessage("nova", "Sistema Operativo. Base de datos cargada con 8 registros de prueba. Conexión estable.");
                } else if (input.includes("limpiar")) {
                    document.getElementById('chat-window').innerHTML = "";
                    addMessage("nova", "Chat limpio. ¿En qué más puedo ayudarte?");
                } else if (input.includes("buscar")) {
                    const code = input.split("buscar")[1]?.trim();
                    if (code) {
                        searchTariff(code);
                    } else {
                        addMessage("nova", "Por favor especifica el código a buscar. Ejemplo: 'Buscar 1005.90.04'");
                    }
                } else {
                    addMessage("nova", "No reconozco ese comando. Escribe 'Ayuda' para ver opciones.");
                }
            }, 500);
        }

        function searchTariff(code) {
            const result = tariffDB.find(item => item.code === code);
            if (result) {
                const resultHTML = `
                    <div class="tariff-card">
                        <div class="tariff-code">Código TIGIE: ${result.code}</div>
                        <div><strong>Descripción:</strong> ${result.desc}</div>
                        <div><strong>Unidad:</strong> ${result.unit}</div>
                        <div><strong>Arancel:</strong> ${result.tax}</div>
                    </div>
                `;
                addMessage("nova", `Encontrado en base de datos:<br>${resultHTML}`);
            } else {
                addMessage("nova", `No se encontró el código <b>${code}</b> en la base de datos actual. Intenta con otro código.`);
            }
        }

        // Add welcome message after a short delay
        setTimeout(() => {
             // Wait for user to click start or auto-start if needed
        }, 500);

    </script>
</body>
</html>
